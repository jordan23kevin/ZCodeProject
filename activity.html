<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temu 报活动 v4.1.3</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a1a;color:#eee;padding:22px;min-height:100vh}
  h1{text-align:center;font-size:32px;margin:0 0 16px}
  h1 .v{font-size:15px;color:#666;font-weight:normal;margin-left:8px}
  .toolbar{text-align:center;margin-bottom:18px;position:sticky;top:0;background:#1a1a1a;padding:12px 0;z-index:20;border-bottom:1px solid #333}
  .toolbar button{padding:11px 16px;font-size:15px;border-radius:5px;border:1px solid #555;background:#2a2a2a;color:#eee;margin-left:6px}
  .toolbar button{cursor:pointer;font-weight:600}
  .toolbar button:hover:not(:disabled){background:#333}
  .toolbar button:disabled{opacity:.45;cursor:not-allowed}
  .toolbar .btn-green{background:#4CAF50;color:#fff;border:none}
  .toolbar .btn-green:hover:not(:disabled){background:#388e3c}
  .toolbar .btn-red{background:#e53935;color:#fff;border:none}
  .toolbar .btn-red:hover:not(:disabled){background:#b71c1c}
  .toolbar label{color:#aaa;cursor:pointer;user-select:none;margin-left:10px;font-size:15px}

  .panel{background:#252525;border:1px solid #444;border-radius:10px;padding:16px 20px;margin:0 auto 22px;max-width:1400px}
  .panel-title{font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .status-row{display:flex;gap:20px;flex-wrap:wrap;font-size:15px;color:#bbb;margin-bottom:10px}
  .status-row span{display:inline-flex;align-items:center;gap:6px}
  .status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid}
  .status-idle{background:#1b3a1b;color:#7ee787;border-color:#2e7d32}
  .status-running{background:#3d2e0b;color:#f7c843;border-color:#9e6a03}
  .status-completed{background:#1b3a1b;color:#7ee787;border-color:#2e7d32}
  .status-error{background:#3d0f0f;color:#f87171;border-color:#a42c2c}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #8b949e;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .progress-bar-wrap{width:100%;height:22px;background:#333;border-radius:11px;overflow:hidden;margin-top:6px}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#4CAF50,#8BC34A);transition:width .4s ease}

  .step-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .step-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:5px;background:#1b3a1b;color:#7ee787;font-size:13px;border:1px solid #2e7d32}
  .step-tag.current{background:#3d2e0b;color:#f7c843;border-color:#9e6a03}
  .step-tag.pending{background:#2a2a2a;color:#888;border-color:#555}

  .log-box{background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:10px 14px;height:420px;overflow-y:auto;font-family:"Cascadia Code",Consolas,monospace;font-size:12px;line-height:1.6;white-space:pre-wrap}
  .log-box .line{color:#8b949e}
  .log-box .line.ok{color:#7ee787}
  .log-box .line.warn{color:#f7c843}
  .log-box .line.error{color:#f87171}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:14px 26px;border-radius:8px;font-size:16px;display:none;z-index:999;max-width:80%}
</style>
</head>
<body>
<h1>Temu 报活动 <span class="v">v4.1.3</span></h1>

<div class="toolbar">
  <button class="btn-green" onclick="startActivity()" id="btnStart">🚀 启动报活动</button>
  <button class="btn-red" onclick="stopActivity()" id="btnStop" disabled>⏹ 停止</button>
  <label>
    <input type="checkbox" id="autoScroll" checked style="width:16px;height:16px;accent-color:#4CAF50;vertical-align:middle"> 日志自动滚动
  </label>
</div>

<div class="panel">
  <div class="panel-title">
    <span>任务状态</span>
    <span id="statusBadge" class="status-badge status-idle"><span class="spinner" id="statusSpinner" style="display:none"></span><span id="statusLabel">就绪</span></span>
  </div>
  <div class="status-row">
    <span>当前步骤: <b id="currentStep">-</b></span>
    <span>已完成: <b id="completedCount" class="num">0</b> 步</span>
    <span>启动时间: <b id="startTime">-</b></span>
    <span>总耗时: <b id="totalElapsed" class="num">0s</b></span>
  </div>
  <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
</div>

<div class="panel">
  <div class="panel-title">
    <span>已完成步骤</span>
  </div>
  <div id="stepList" class="step-list">
    <span class="step-tag pending">暂无</span>
  </div>
</div>

<div class="panel">
  <div class="panel-title">
    <span>实时日志</span>
    <button onclick="clearLog()" style="padding:5px 12px;font-size:13px;border-radius:5px;border:1px solid #555;background:#2a2a2a;color:#eee;cursor:pointer">清空</button>
  </div>
  <div id="logBox" class="log-box"></div>
</div>

<div id="toast" class="toast"></div>

<script>
function showToast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.style.display='block';
  setTimeout(function(){t.style.display='none';},3500);
}
function formatTime(d){
  if(!d)return '-';
  var x=new Date(d);
  return x.getFullYear()+'-'+(x.getMonth()+1).toString().padStart(2,'0')+'-'+x.getDate().toString().padStart(2,'0')+' '+x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0')+':'+x.getSeconds().toString().padStart(2,'0');
}
function formatDuration(s){
  if(s===undefined||s===null||s==='')return '-';
  s=parseInt(s,10);
  if(s<60)return s+'s';
  var m=Math.floor(s/60),sec=s%60;
  if(m<60)return m+'m '+sec+'s';
  var h=Math.floor(m/60);m=m%60;
  return h+'h '+m+'m';
}

var pollTimer=null;

function setStatus(status,label){
  var b=document.getElementById('statusBadge');
  b.className='status-badge status-'+status;
  document.getElementById('statusLabel').textContent=label;
  document.getElementById('statusSpinner').style.display=(status==='running'?'inline-block':'none');
  var running=(status==='running');
  document.getElementById('btnStart').disabled=running;
  document.getElementById('btnStop').disabled=!running;
}

function appendLog(line,kind){
  var box=document.getElementById('logBox');
  var div=document.createElement('div');
  div.className='line '+(kind||'');
  div.textContent=line;
  box.appendChild(div);
  if(document.getElementById('autoScroll').checked){
    box.scrollTop=box.scrollHeight;
  }
}
function clearLog(){
  document.getElementById('logBox').innerHTML='';
}

function startActivity(){
  fetch('/api/activity/start',{method:'POST',headers:{'Content-Type':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.success){showToast('❌ '+(d.message||'启动失败'));return;}
      showToast('✅ '+d.message);
      setStatus('running','运行中');
      beginPoll();
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}

function stopActivity(){
  fetch('/api/activity/stop',{method:'POST'})
    .then(function(r){return r.json();})
    .then(function(d){
      showToast(d.success?'⏹ 已停止':'❌ 停止失败');
      setStatus('idle','就绪');
      stopPoll();
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}

function beginPoll(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(pollStatus,2000);
  pollStatus();
}
function stopPoll(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
}

function renderSteps(current,completed){
  var box=document.getElementById('stepList');
  if(!completed || !completed.length){
    box.innerHTML='<span class="step-tag pending">暂无</span>';
    return;
  }
  var html='';
  completed.forEach(function(step){
    html+='<span class="step-tag">✓ '+step+'</span>';
  });
  if(current){
    html+='<span class="step-tag current">▶ '+current+'</span>';
  }
  box.innerHTML=html;
}

var TOTAL_STEP_ESTIMATE=9;

function pollStatus(){
  fetch('/api/activity/status').then(function(r){return r.json();}).then(function(d){
    var state=d.state_info||{};
    document.getElementById('currentStep').textContent=state.current_step||'-';
    var completed=state.completed_steps||[];
    document.getElementById('completedCount').textContent=completed.length.toString();
    document.getElementById('startTime').textContent=formatTime(d.started_at);
    document.getElementById('totalElapsed').textContent=formatDuration(d.elapsed_sec);

    if(d.log && d.log.length){
      d.log.forEach(function(e){appendLog(e.line||e,e.kind);});
    }

    renderSteps(state.current_step,completed);

    var total=Math.max(TOTAL_STEP_ESTIMATE,completed.length+(state.current_step?1:0));
    var pct=Math.min(100,Math.round((completed.length+(state.current_step?0.5:0))/total*100));
    if(d.status==='completed') pct=100;
    document.getElementById('progressBar').style.width=pct+'%';

    if(d.status==='running'){
      setStatus('running','运行中');
    }else if(d.status==='error'){
      setStatus('error','出错');
      stopPoll();
    }else if(d.status==='completed'){
      setStatus('completed','完成');
      stopPoll();
    }else{
      setStatus('idle','就绪');
      stopPoll();
    }
  }).catch(function(e){console.log('poll error',e);});
}

setStatus('idle','就绪');
pollStatus();
</script>
</body>
</html>
