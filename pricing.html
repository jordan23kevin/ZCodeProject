<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temu 核价 — Hermes v5.2</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a1a;color:#eee;padding:22px;min-height:100vh}
  h1{text-align:center;font-size:32px;margin:0 0 16px}
  h1 .v{font-size:15px;color:#666;font-weight:normal;margin-left:8px}
  .toolbar{text-align:center;margin-bottom:18px;position:sticky;top:0;background:#1a1a1a;padding:12px 0;z-index:20;border-bottom:1px solid #333}
  .toolbar button,.toolbar input{padding:11px 16px;font-size:15px;border-radius:5px;border:1px solid #555;background:#2a2a2a;color:#eee;margin-left:6px}
  .toolbar button{cursor:pointer;background:#2196F3;color:#fff;border:none;font-weight:600}
  .toolbar button:hover:not(:disabled){background:#1976D2}
  .toolbar button:disabled{opacity:.45;cursor:not-allowed}
  .toolbar .btn-green{background:#4CAF50}
  .toolbar .btn-green:hover:not(:disabled){background:#388e3c}
  .toolbar .btn-orange{background:#ff9800}
  .toolbar .btn-orange:hover:not(:disabled){background:#f57c00}
  .toolbar .btn-red{background:#e53935}
  .toolbar .btn-red:hover:not(:disabled){background:#b71c1c}
  .toolbar .btn-purple{background:#9c27b0}
  .toolbar .btn-purple:hover:not(:disabled){background:#7b1fa2}
  .toolbar input{width:90px;text-align:center}
  .toolbar label{color:#aaa;cursor:pointer;user-select:none;margin-left:10px;font-size:15px}

  .panel{background:#252525;border:1px solid #444;border-radius:10px;padding:16px 20px;margin:0 auto 22px;max-width:1400px}
  .panel-title{font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .status-row{display:flex;gap:20px;flex-wrap:wrap;font-size:15px;color:#bbb;margin-bottom:10px}
  .status-row span{display:inline-flex;align-items:center;gap:6px}
  .status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid}
  .status-idle{background:#1b3a1b;color:#7ee787;border-color:#2e7d32}
  .status-running{background:#3d2e0b;color:#f7c843;border-color:#9e6a03}
  .status-completed{background:#1b3a1b;color:#7ee787;border-color:#2e7d32}
  .status-error{background:#3d0f0f;color:#f87171;border-color:#a42c2c}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #8b949e;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .progress-bar-wrap{width:100%;height:22px;background:#333;border-radius:11px;overflow:hidden;margin-top:6px}
  .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#4CAF50,#8BC34A);transition:width .4s ease}

  .log-box{background:#0d0d0d;border:1px solid #333;border-radius:6px;padding:10px 14px;height:320px;overflow-y:auto;font-family:"Cascadia Code",Consolas,monospace;font-size:12px;line-height:1.6;white-space:pre-wrap}
  .log-box .line{color:#8b949e}
  .log-box .line.ok{color:#7ee787}
  .log-box .line.warn{color:#f7c843}
  .log-box .line.error{color:#f87171}

  .section-title{font-size:22px;font-weight:700;margin:26px 0 14px;padding-bottom:8px;border-bottom:2px solid #333;max-width:1400px;margin-left:auto;margin-right:auto}
  .section-title .sub{font-size:14px;color:#888;font-weight:normal;margin-left:10px}

  table{width:100%;border-collapse:collapse;font-size:14px;max-width:1400px;margin:0 auto;background:#252525;border:1px solid #444;border-radius:10px;overflow:hidden}
  th,td{padding:10px 12px;border-bottom:1px solid #333;text-align:center}
  th{background:#333;color:#ccc;font-weight:600}
  tr:hover td{background:#2f2f2f}
  tr:last-child td{border-bottom:none}
  .num{font-variant-numeric:tabular-nums}
  .empty{text-align:center;color:#888;margin-top:40px;font-size:17px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:14px 26px;border-radius:8px;font-size:16px;display:none;z-index:999;max-width:80%}
  .result-files{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .file-link{display:inline-block;padding:6px 12px;background:#2a2a2a;border:1px solid #555;border-radius:5px;color:#58a6ff;font-size:13px;cursor:pointer}
  .file-link:hover{background:#333;text-decoration:underline}
</style>
</head>
<body>
<h1>Temu 核价 <span class="v">Hermes v5.2</span></h1>

<div class="toolbar">
  <button class="btn-green" onclick="startPricing(false)" id="btnStart">🚀 完整自动核价</button>
  <button class="btn-orange" onclick="startPricing(true)" id="btnNoSubmit">✋ 仅核价不提交</button>
  <button class="btn-purple" onclick="continueSubmit()" id="btnContinue">▶️ 继续提交</button>
  <button class="btn-red" onclick="exportPrices()" id="btnExport">📊 导出结果</button>
  <input type="text" id="retryPages" placeholder="页码 如 2 5" title="空格分隔页码">
  <button onclick="retryPages()" id="btnRetry">🔁 重试指定页</button>
  <button class="btn-green" onclick="sendSignal()" id="btnSignal" disabled>👌 好了</button>
  <button onclick="stopPricing()" id="btnStop" disabled>⏹ 停止</button>
  <label>
    <input type="checkbox" id="autoScroll" checked style="width:16px;height:16px;accent-color:#4CAF50;vertical-align:middle"> 日志自动滚动
  </label>
</div>
<div id="signalHint" style="text-align:center;color:#f7c843;font-size:15px;margin-bottom:12px;display:none">
  ⏳ 请在 Edge 登录 Temu 并打开核价页面，然后点击 👌 <b>好了</b>
</div>

<div class="panel">
  <div class="panel-title">
    <span>任务状态</span>
    <span id="statusBadge" class="status-badge status-idle"><span class="spinner" id="statusSpinner" style="display:none"></span><span id="statusLabel">就绪</span></span>
  </div>
  <div class="status-row">
    <span>任务: <b id="taskName">-</b></span>
    <span>启动时间: <b id="startTime">-</b></span>
    <span>已处理页数: <b id="processedPages" class="num">0</b></span>
    <span>总耗时: <b id="totalElapsed" class="num">0s</b></span>
  </div>
  <div class="progress-bar-wrap"><div id="progressBar" class="progress-bar"></div></div>
</div>

<div class="panel">
  <div class="panel-title">
    <span>实时日志</span>
    <button class="btn-purple" onclick="clearLog()" style="padding:5px 12px;font-size:13px">清空</button>
  </div>
  <div id="logBox" class="log-box"></div>
</div>

<div class="section-title">核价结果档案 <span class="sub" id="resultSub"></span></div>
<div id="resultFiles" class="panel result-files" style="display:none"></div>

<div class="section-title">分页记录 <span class="sub" id="pageSub"></span></div>
<table id="pageTable" style="display:none">
  <thead>
    <tr>
      <th>页码</th>
      <th>扫描</th>
      <th>已核价</th>
      <th>已填价</th>
      <th>已提交</th>
      <th>耗时</th>
    </tr>
  </thead>
  <tbody id="pageTbody"></tbody>
</table>
<div id="emptyState" class="empty">暂无核价记录</div>

<div id="toast" class="toast"></div>

<script>
function showToast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.style.display='block';
  setTimeout(function(){t.style.display='none';},3500);
}
function formatTime(d){
  if(!d)return '-';
  var x=new Date(d);
  return x.getFullYear()+'-'+(x.getMonth()+1).toString().padStart(2,'0')+'-'+x.getDate().toString().padStart(2,'0')+' '+x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0')+':'+x.getSeconds().toString().padStart(2,'0');
}
function formatDuration(s){
  if(s===undefined||s===null||s==='')return '-';
  s=parseInt(s,10);
  if(s<60)return s+'s';
  var m=Math.floor(s/60),sec=s%60;
  if(m<60)return m+'m '+sec+'s';
  var h=Math.floor(m/60);m=m%60;
  return h+'h '+m+'m';
}

var pollTimer=null;
var currentMode='idle';

function setStatus(status,label){
  var b=document.getElementById('statusBadge');
  b.className='status-badge status-'+status;
  document.getElementById('statusLabel').textContent=label;
  document.getElementById('statusSpinner').style.display=(status==='running'?'inline-block':'none');
  var running=(status==='running');
  document.getElementById('btnStart').disabled=running;
  document.getElementById('btnNoSubmit').disabled=running;
  document.getElementById('btnContinue').disabled=running;
  document.getElementById('btnExport').disabled=running;
  document.getElementById('btnRetry').disabled=running;
  document.getElementById('btnStop').disabled=!running;
  document.getElementById('btnSignal').disabled=!running;
  document.getElementById('signalHint').style.display=running?'block':'none';
}

function appendLog(line,kind){
  var box=document.getElementById('logBox');
  var div=document.createElement('div');
  div.className='line '+(kind||'');
  div.textContent=line;
  box.appendChild(div);
  if(document.getElementById('autoScroll').checked){
    box.scrollTop=box.scrollHeight;
  }
}
function clearLog(){
  document.getElementById('logBox').innerHTML='';
}

function startPricing(noSubmit){
  var mode=noSubmit?'no-submit':'full';
  currentMode=mode;
  fetch('/api/pricing/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:mode})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){showToast('❌ '+d.error);return;}
      showToast('✅ '+d.msg);
      setStatus('running',noSubmit?'仅核价不提交':'完整自动核价');
      beginPoll();
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}
function continueSubmit(){
  currentMode='continue';
  fetch('/api/pricing/continue',{method:'POST'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){showToast('❌ '+d.error);return;}
      showToast('✅ '+d.msg);
      setStatus('running','继续提交');
      beginPoll();
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}
function retryPages(){
  var val=document.getElementById('retryPages').value.trim();
  if(!val){showToast('请输入页码');return;}
  currentMode='retry';
  fetch('/api/pricing/retry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pages:val})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){showToast('❌ '+d.error);return;}
      showToast('✅ '+d.msg);
      setStatus('running','重试指定页');
      beginPoll();
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}
function exportPrices(){
  fetch('/api/pricing/export',{method:'POST'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){showToast('❌ '+d.error);return;}
      showToast('✅ '+d.msg);
      loadResultFiles();
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}
function sendSignal(){
  fetch('/api/pricing/signal',{method:'POST'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){showToast('❌ '+d.error);return;}
      showToast('✅ '+d.msg);
      document.getElementById('signalHint').style.display='none';
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}

function stopPricing(){
  fetch('/api/pricing/stop',{method:'POST'})
    .then(function(r){return r.json();})
    .then(function(d){
      showToast(d.msg||'已停止');
      setStatus('idle','就绪');
      document.getElementById('signalHint').style.display='none';
    }).catch(function(e){showToast('❌ 请求失败: '+e);});
}

function beginPoll(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(pollStatus,1200);
  pollStatus();
}
function stopPoll(){
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
}

function pollStatus(){
  fetch('/api/pricing/status').then(function(r){return r.json();}).then(function(d){
    document.getElementById('taskName').textContent=d.task||'-';
    document.getElementById('startTime').textContent=formatTime(d.started_at);
    document.getElementById('processedPages').textContent=(d.processed_pages||0).toString();
    document.getElementById('totalElapsed').textContent=formatDuration(d.elapsed_sec);

    // logs
    if(d.log && d.log.length){
      d.log.forEach(function(e){appendLog(e.line,e.kind);});
    }

    // progress
    var total=5;
    if(d.page_records && d.page_records.length) total=Math.max(total,d.page_records[d.page_records.length-1].page);
    var pct=Math.min(100,Math.round((d.processed_pages||0)/total*100));
    document.getElementById('progressBar').style.width=pct+'%';

    // status badge
    if(d.status==='running'){
      setStatus('running',d.task_label||'运行中');
    }else if(d.status==='error'){
      setStatus('error','出错');
      stopPoll();
    }else if(d.status==='completed'){
      setStatus('completed','完成');
      stopPoll();
    }else{
      setStatus('idle','就绪');
      stopPoll();
    }

    renderPageRecords(d.page_records||[]);
    if(d.status!=='running') loadResultFiles();
  }).catch(function(e){console.log('poll error',e);});
}

function renderPageRecords(records){
  var tb=document.getElementById('pageTbody');
  var table=document.getElementById('pageTable');
  var empty=document.getElementById('emptyState');
  if(!records.length){
    table.style.display='none';empty.style.display='block';
    document.getElementById('pageSub').textContent='';
    return;
  }
  table.style.display='table';empty.style.display='none';
  document.getElementById('pageSub').textContent='共 '+records.length+' 页';
  var html='';
  records.forEach(function(r){
    html+='<tr>'
      +'<td class="num">'+r.page+'</td>'
      +'<td class="num">'+r.scanned+'</td>'
      +'<td class="num">'+r.checked+'</td>'
      +'<td class="num">'+r.priced+'</td>'
      +'<td class="num">'+r.submitted+'</td>'
      +'<td class="num">'+formatDuration(r.elapsed_sec)+'</td>'
      +'</tr>';
  });
  tb.innerHTML=html;
}

function loadResultFiles(){
  fetch('/api/pricing/result-files').then(function(r){return r.json();}).then(function(d){
    var box=document.getElementById('resultFiles');
    if(!d.files || !d.files.length){box.style.display='none';return;}
    box.style.display='flex';
    document.getElementById('resultSub').textContent='共 '+d.files.length+' 个文件';
    box.innerHTML=d.files.map(function(f){
      return '<a class="file-link" href="/api/pricing/download?file='+encodeURIComponent(f.name)+'" title="'+f.path+'">'+f.name+' ('+f.size+')</a>';
    }).join('');
  }).catch(function(e){console.log('load files error',e);});
}

// initial load
setStatus('idle','就绪');
pollStatus();
loadResultFiles();
</script>
</body>
</html>
